"$schema" = 'https://starship.rs/config-schema.json'

# ── 配色（Dracula パレットで全体を統一） ──────────────────────
palette = "dracula"
add_newline = true

# ── プロンプト全体の構成（二段組・アイコン主体） ────────────────
# 上段に各種情報を一望し、下段の ❯ から入力する。背景色は使わず、
# 文字色とアイコンだけで彩る。グリフは Nerd Font の番地を直に指定。
format = """
[╭─](bold cyan)$username$hostname$directory$git_branch$git_status$git_state\
$nodejs$python$rust$golang$java$ruby$php$docker_context\
$jobs$cmd_duration
[╰─](bold cyan)$character"""

# Dracula 公式パレット（https://draculatheme.com/contribute）
[palettes.dracula]
background   = "#282a36"
current_line = "#44475a"
foreground   = "#f8f8f2"
comment      = "#6272a4"
cyan         = "#8be9fd"
green        = "#50fa7b"
orange       = "#ffb86c"
pink         = "#ff79c6"
purple       = "#bd93f9"
red          = "#ff5555"
yellow       = "#f1fa8c"

# ── ユーザ・ホスト（root / SSH のときだけ表示） ──────────────────
[username]
show_always = false
style_user = "bold yellow"
style_root = "bold red"
format = "[ $user]($style)[@](bold foreground)"

[hostname]
ssh_only = true
format = "[ $hostname](bold green) "
disabled = false

# ── カレントディレクトリ ───────────────────────────────────────
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
read_only = " 󰌾"
read_only_style = "red"
format = "[ $path]($style)[$read_only]($read_only_style) "

# ── Git ───────────────────────────────────────────────────────
[git_branch]
symbol = ""
style = "bold purple"
format = "on [$symbol $branch]($style) "

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "✖${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "≡${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[git_state]
style = "bold orange"
format = '[$state( $progress_current/$progress_total)]($style) '

# ── バックグラウンドジョブ ────────────────────────────────────────
[jobs]
symbol = "●"
style = "bold orange"
number_threshold = 1
format = "[$symbol $number]($style) "

# ── コマンド実行時間（500ms 以上かかったら表示） ─────────────────
[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [ $duration]($style) "

# ── プロンプト記号（成功は緑 ❯ / 失敗は赤 ❯） ───────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ── 言語ランタイム（該当の環境があるときだけ自動表示） ──────────
[nodejs]
symbol = ""
format = "via [$symbol $version]($style) "
style = "bold green"

[python]
symbol = ""
format = 'via [$symbol $version(\($virtualenv\))]($style) '
style = "bold yellow"

[rust]
symbol = "󱘗"
format = "via [$symbol $version]($style) "
style = "bold orange"

[golang]
symbol = ""
format = "via [$symbol $version]($style) "
style = "bold cyan"

[java]
symbol = ""
format = "via [$symbol $version]($style) "
style = "bold red"

[ruby]
symbol = ""
format = "via [$symbol $version]($style) "
style = "bold red"

[php]
symbol = ""
format = "via [$symbol $version]($style) "
style = "bold comment"

[docker_context]
symbol = ""
format = "via [$symbol $context]($style) "
style = "bold comment"
